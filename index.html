<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSoft Tecnologia Ltda - Em Breve</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            color: #555;
            max-width: 600px;
        }
        .loader {
            margin-top: 30px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #27ae60; /* Cor verde remetendo ao agro */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>AgroSoft Tecnologia Ltda</h1>
    <p>Bem-vindo ao <strong>www.agrocore.ia.br</strong>.</p>
    <p>Nossas soluções tecnológicas estão atualmente em desenvolvimento. Em breve, traremos novidades operacionais para o setor.</p>
    <div class="loader"></div>
</body>
</html>
